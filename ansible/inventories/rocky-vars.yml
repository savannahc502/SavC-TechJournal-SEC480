# Rocky Varibles 

# Grabs:
# - Host ip within the group (assigned DHCP IP address it was given)
# - Hostname variable specific to that host
# - lan_ip varible specific to that host (Assigned within the lab)

rocky: # group name
  hosts:
    10.0.5.75: 
      hostname: rocky-1 
      lan_ip: 10.0.5.10
    10.0.5.76:
      hostname: rocky-2
      lan_ip: 10.0.5.11
    10.0.5.77:
      hostname: rocky-3
      lan_ip: 10.0.5.12
  vars: # Varibles that apply to all VMs
    public_key: "ssh-rsa  admin key"
    ansible_user: luser
    prefix: 24
    gateway: 10.0.5.2
    name_server: 10.0.5.2
    domain: blue1.local
    device: ens33
