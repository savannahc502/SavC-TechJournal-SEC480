- name: install and configure wazuh agent rocky
  hosts: wazuh_agents
  become: yes

  vars:
    wazuh_manager_ip: "10.0.5.87"
    wazuh_agent_group: "linux"
    wazuh_agent_name: "{{ inventory_hostname }}"

  tasks:
    - name: dependencies
      dnf:
        name:
          - curl
          - gnupg2
        state: present

    - name: wazuh agent url download
      get_url:
        url: https://packages.wazuh.com/4.x/yum/wazuh-agent-4.7.5-1.x86_64.rpm
        dest: /tmp/wazuh-agent.rpm

    - name: install wazuh agent
      command: rpm -ihv /tmp/wazuh-agent.rpm

    - name: manager IP
      lineinfile:
        path: /var/ossec/etc/ossec.conf
        regexp: '<address>.*</address>'
        line: '<address>{{ wazuh_manager_ip }}</address>'

    - name: agent name
      lineinfile:
        path: /var/ossec/etc/ossec.conf
        regexp: '<name>.*</name>'
        line: '<name>{{ wazuh_agent_name }}</name>'

    - name: agent group
      lineinfile:
        path: /var/ossec/etc/ossec.conf
        regexp: '<group>.*</group>'
        line: '<group>{{ wazuh_agent_group }}</group>'

    - name: enable and start wazuh 
      systemd:
        name: wazuh-agent
        enabled: yes
        state: restarted
