- name: Install Wazuh Agent on Ubuntu
  hosts: wazuh_agents
  become: yes

  vars:
    wazuh_manager_ip: "10.0.5.84" 

  tasks:
    - name: Install required packages
      ansible.builtin.apt:
        name:
          - curl
          - apt-transport-https
          - gnupg
        state: present
        update_cache: yes

    - name: Add Wazuh GPG key
      ansible.builtin.shell: |
        curl -s https://packages.wazuh.com/key/GPG-KEY-WAZUH | apt-key add -
      args:
        warn: false

    - name: Add Wazuh repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/wazuh.list
        content: "deb https://packages.wazuh.com/4.x/apt/ stable main"

    - name: Install Wazuh Agent
      ansible.builtin.apt:
        name: wazuh-agent
        state: present
        update_cache: yes

    - name: Configure agent to point to manager
      ansible.builtin.lineinfile:
        path: /var/ossec/etc/ossec.conf
        regexp: '<address>.*</address>'
        line: "<address>{{ wazuh_manager_ip }}</address>"

    - name: Enable and start Wazuh Agent
      ansible.builtin.service:
        name: wazuh-agent
        state: started
        enabled: yes
